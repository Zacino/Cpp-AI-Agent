<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 左侧 Sidebar */
        .sidebar {
            width: 260px;
            background: #202123;
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #4d4d4f;
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #4d4d4f;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #4d4d4f;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #2d2d2e;
        }

        .new-chat-btn svg {
            width: 16px;
            height: 16px;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .session-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: background 0.2s;
            position: relative;
        }

        .session-item:hover {
            background: #2d2d2e;
        }

        .session-item.active {
            background: #343541;
        }

        .session-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .session-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-delete {
            opacity: 0;
            padding: 4px;
            border-radius: 4px;
            transition: opacity 0.2s, background 0.2s;
        }

        .session-item:hover .session-delete {
            opacity: 1;
        }

        .session-delete:hover {
            background: #ef4444;
        }

        /* 右侧聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            height: 60px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            background: white;
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #666;
        }

        .welcome-screen h1 {
            font-size: 32px;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #10a37f, #19c59f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-screen p {
            font-size: 16px;
            max-width: 400px;
            line-height: 1.6;
        }

        .message {
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: white;
        }

        .message.assistant {
            background: #f7f7f8;
        }

        .message-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            line-height: 1.6;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #10a37f;
            color: white;
        }

        .message.assistant .message-avatar {
            background: #5436da;
            color: white;
        }

        .message-text {
            flex: 1;
            padding-top: 4px;
            font-size: 15px;
            color: #333;
        }

        /* 工具调用显示 */
        .tool-call {
            margin: 12px 0;
            padding: 12px 16px;
            background: #f0f0f0;
            border-radius: 8px;
            border-left: 3px solid #5436da;
            font-size: 13px;
        }

        .tool-call-name {
            font-weight: 600;
            color: #5436da;
            margin-bottom: 6px;
        }

        .tool-call-args {
            color: #666;
            font-family: monospace;
            white-space: pre-wrap;
        }

        /* 输入区域 */
        .input-container {
            border-top: 1px solid #e5e5e5;
            padding: 20px;
            background: white;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #10a37f;
            box-shadow: 0 2px 12px rgba(16, 163, 127, 0.15);
        }

        .message-input {
            width: 100%;
            border: none;
            outline: none;
            padding: 16px 50px 16px 16px;
            font-size: 15px;
            resize: none;
            min-height: 56px;
            max-height: 200px;
            border-radius: 12px;
            font-family: inherit;
        }

        .send-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            width: 32px;
            height: 32px;
            border: none;
            background: #10a37f;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: #0d8c6d;
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 打字指示器 */
        .typing-indicator {
            display: none;
            padding: 20px;
            background: #f7f7f8;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #5436da;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧 Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewSession()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    新对话
                </button>
            </div>
            <div class="session-list" id="session-list">
                <!-- Session items will be inserted here -->
            </div>
        </div>

        <!-- 右侧聊天区域 -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="chat-title">选择一个对话开始</h2>
            </div>

            <div class="messages-container" id="messages">
                <div class="welcome-screen">
                    <h1>AI Agent</h1>
                    <p>在左侧选择一个对话，或点击"新对话"开始聊天。每个对话都有独立的短期记忆，长期记忆会在所有对话间共享。</p>
                </div>
            </div>

            <div class="typing-indicator" id="typing">
                <div class="typing-content">
                    <div class="message-avatar">🤖</div>
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        class="message-input" 
                        id="input" 
                        placeholder="发送消息..."
                        rows="1"
                        disabled
                    ></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessions = [];
        let currentSessionId = null;
        let isLoading = false;

        const sessionList = document.getElementById('session-list');
        const messagesContainer = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');
        const chatTitle = document.getElementById('chat-title');

        // Auto-resize textarea
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Enter to send, Shift+Enter for new line
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Load sessions on startup
        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                const data = await response.json();
                
                sessions = (data.sessions || []).map(s => ({
                    id: s.session_id,
                    title: s.title || `对话 ${s.session_id.substr(0, 8)}`,
                    messages: []
                }));
                
                renderSessionList();
                
                // 如果有 session，自动加载第一个
                if (sessions.length > 0) {
                    switchSession(sessions[0].id);
                }
            } catch (error) {
                console.error('Failed to load sessions:', error);
            }
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
                item.onclick = () => switchSession(session.id);
                item.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span class="session-title">${session.title}</span>
                    <svg class="session-delete" onclick="event.stopPropagation(); deleteSession('${session.id}')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                `;
                sessionList.appendChild(item);
            });
        }

        async function createNewSession() {
            try {
                const response = await fetch('/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                });
                const data = await response.json();
                
                const session = {
                    id: data.session_id,
                    title: data.title || `新对话 ${sessions.length + 1}`,
                    messages: []
                };
                sessions.unshift(session);
                renderSessionList();
                switchSession(session.id);
            } catch (error) {
                console.error('Failed to create session:', error);
                alert('创建会话失败');
            }
        }

        async function switchSession(sessionId) {
            currentSessionId = sessionId;
            const session = sessions.find(s => s.id === sessionId);
            
            if (session) {
                chatTitle.textContent = session.title;
                renderMessages(session.messages);
                
                // Load messages from server
                try {
                    const response = await fetch(`/sessions/${sessionId}/messages`);
                    const data = await response.json();
                    session.messages = data.messages || [];
                    renderMessages(session.messages);
                } catch (error) {
                    console.error('Failed to load messages:', error);
                }
            }
            
            renderSessionList();
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }

        function renderMessages(messages) {
            if (!messages || messages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="welcome-screen">
                        <h1>AI Agent</h1>
                        <p>开始新的对话吧！</p>
                    </div>
                `;
                return;
            }

            messagesContainer.innerHTML = '';
            messages.forEach(msg => {
                addMessageToUI(msg.role, msg.content, false);
            });
            scrollToBottom();
        }

        function addMessageToUI(role, content, animate = true) {
            const welcomeScreen = messagesContainer.querySelector('.welcome-screen');
            if (welcomeScreen) {
                welcomeScreen.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            if (animate) messageDiv.style.animation = 'fadeIn 0.3s ease';
            
            const avatar = role === 'user' ? '👤' : '🤖';
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-avatar">${avatar}</div>
                    <div class="message-text">${escapeHtml(content)}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isLoading || !currentSessionId) return;

            // Add user message to UI
            addMessageToUI('user', text);
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            
            // Show typing indicator
            showTyping();
            
            // Disable input
            isLoading = true;
            input.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        message: text
                    })
                });

                const data = await response.json();
                hideTyping();

                if (data.success) {
                    addMessageToUI('assistant', data.reply);
                    
                    // Show tool calls if any
                    if (data.tool_calls && data.tool_calls.length > 0) {
                        data.tool_calls.forEach(tool => {
                            addToolCallToUI(tool.name, tool.arguments);
                        });
                    }
                } else {
                    addMessageToUI('system', `错误: ${data.error || '未知错误'}`);
                }
            } catch (error) {
                hideTyping();
                console.error('Failed to send message:', error);
                addMessageToUI('system', '发送失败，请重试');
            } finally {
                isLoading = false;
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function addToolCallToUI(name, args) {
            const toolDiv = document.createElement('div');
            toolDiv.className = 'message assistant';
            toolDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-avatar">🔧</div>
                    <div class="message-text">
                        <div class="tool-call">
                            <div class="tool-call-name">${name}</div>
                            <div class="tool-call-args">${JSON.stringify(args, null, 2)}</div>
                        </div>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(toolDiv);
            scrollToBottom();
        }

        function showTyping() {
            typingIndicator.classList.add('active');
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.classList.remove('active');
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个对话吗？')) return;
            
            try {
                await fetch(`/sessions/${sessionId}`, { method: 'DELETE' });
                sessions = sessions.filter(s => s.id !== sessionId);
                
                if (currentSessionId === sessionId) {
                    currentSessionId = null;
                    messagesContainer.innerHTML = `
                        <div class="welcome-screen">
                            <h1>AI Agent</h1>
                            <p>在左侧选择一个对话，或点击"新对话"开始聊天。</p>
                        </div>
                    `;
                    chatTitle.textContent = '选择一个对话开始';
                    input.disabled = true;
                    sendBtn.disabled = true;
                }
                
                renderSessionList();
            } catch (error) {
                console.error('Failed to delete session:', error);
            }
        }

        // Initialize
        loadSessions();
    </script>
</body>
</html>
